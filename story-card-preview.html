<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Story Card Preview — ConcertID</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#09090b;color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh;padding:24px 16px 60px;display:flex;flex-direction:column;align-items:center;gap:20px}
  h1{font-size:1.1rem;font-weight:800;color:#a855f7;margin-top:8px}
  .sub{font-size:.8rem;color:#71717a}
  .picker{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:540px;width:100%}
  .pick-btn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;padding:7px 14px;font-size:.8rem;font-weight:600;color:#a1a1aa;cursor:pointer;font-family:inherit;transition:all .15s}
  .pick-btn.active,.pick-btn:hover{background:rgba(168,85,247,.18);border-color:#a855f7;color:#c084fc}
  .tpl-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .tpl-btn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 18px;font-size:.8rem;font-weight:600;color:#a1a1aa;cursor:pointer;font-family:inherit;transition:all .2s}
  .tpl-btn.active,.tpl-btn:hover{background:rgba(168,85,247,.15);border-color:#a855f7;color:#c084fc}
  .canvas-wrap{display:flex;justify-content:center}
  canvas{width:100%;max-width:280px;border-radius:14px;display:block;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .dl-btn{background:linear-gradient(135deg,#a855f7,#ec4899);border:none;border-radius:12px;padding:12px 28px;font-size:.9rem;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}
  .note{font-size:.75rem;color:#52525b;text-align:center;max-width:360px}
  a.back{color:#a855f7;font-size:.82rem;text-decoration:none}
  a.back:hover{text-decoration:underline}
</style>
</head>
<body>

<a class="back" href="/">← Kembali ke ConcertID</a>
<h1>✨ Story Card Preview</h1>
<p class="sub">Pilih konser dan template, lalu download story card-nya!</p>

<div class="picker" id="concertPicker"></div>

<div class="tpl-row">
  <button class="tpl-btn active" onclick="setTpl('dark',this)">🌑 Dark</button>
  <button class="tpl-btn" onclick="setTpl('purple',this)">💜 Purple</button>
  <button class="tpl-btn" onclick="setTpl('neon',this)">✨ Neon</button>
  <button class="tpl-btn" onclick="setTpl('sunset',this)">🌅 Sunset</button>
</div>

<div class="canvas-wrap">
  <canvas id="sgCanvas" width="540" height="960"></canvas>
</div>

<button class="dl-btn" onclick="download()">⬇️ Download PNG</button>
<p class="note">💡 HP: tap & tahan gambar di atas → "Save Image" untuk simpan ke galeri</p>

<script>
const CONCERTS_SAMPLE = [
  { id:'bts-jakarta-2026',      artist:'BTS',           tour:'BTS WORLD TOUR 2026',               emoji:'💜', dates:['20 Sep 2026'], time:'19:00 WIB', venue:'Gelora Bung Karno Utama', city:'Senayan, Jakarta Pusat', confirmStatus:'confirmed' },
  { id:'the-weeknd-jakarta-2026',artist:'The Weeknd',   tour:'Hurry Up Tomorrow World Tour',       emoji:'🌙', dates:['20 Agu 2026'], time:'19:30 WIB', venue:'Jakarta International Stadium', city:'Tanjung Priok, Jakarta Utara', confirmStatus:'confirmed' },
  { id:'avenged-sevenfold-jakarta-2026',artist:'Avenged Sevenfold',tour:'EVERYBODY DIES WORLD TOUR',emoji:'💀',dates:['2 Agu 2026'], time:'18:30 WIB', venue:'Gelora Bung Karno Utama', city:'Senayan, Jakarta Pusat', confirmStatus:'confirmed' },
  { id:'mcr-jis-2026',          artist:'My Chemical Romance',tour:'MCR The Foundations of Decay Tour',emoji:'🖤',dates:['27 Sep 2026'],time:'18:30 WIB',venue:'Jakarta International Stadium',city:'Tanjung Priok, Jakarta Utara',confirmStatus:'confirmed'},
  { id:'aespa-jakarta-2026',    artist:'aespa',         tour:'SYNK: PARALLEL LINE World Tour',     emoji:'🤖', dates:['12 Jul 2026'], time:'19:00 WIB', venue:'Indonesia Arena, GBK', city:'Senayan, Jakarta Pusat', confirmStatus:'confirmed' },
  { id:'babymonster-jakarta-2026',artist:'BABYMONSTER', tour:'HELLO MONSTER World Tour',           emoji:'👾', dates:['30 Agu 2026'], time:'19:00 WIB', venue:'ICE BSD City', city:'BSD City, Tangerang Selatan', confirmStatus:'confirmed' },
  { id:'laufey-jakarta-2026',   artist:'Laufey',        tour:'A Night At The Symphony',            emoji:'🌸', dates:['4 Apr 2026'],  time:'19:30 WIB', venue:'Jakarta International Stadium', city:'Tanjung Priok, Jakarta Utara', confirmStatus:'confirmed' },
  { id:'one-ok-rock-jakarta-2026',artist:'ONE OK ROCK', tour:'Premonition World Tour',             emoji:'🔥', dates:['22 Nov 2026'], time:'19:00 WIB', venue:'Indonesia Arena, GBK', city:'Senayan, Jakarta Pusat', confirmStatus:'confirmed' },
];

let _currentId  = CONCERTS_SAMPLE[0].id;
let _currentTpl = 'dark';

const TPL = {
  dark:   { bg:['#09090b','#1a0a2e','#09090b'], orb:['rgba(168,85,247,.45)','rgba(236,72,153,.3)'],  btn:['#a855f7','#ec4899'], grid:'rgba(255,255,255,.028)' },
  purple: { bg:['#1e0a3c','#2d1454','#0f0520'], orb:['rgba(168,85,247,.6)','rgba(99,102,241,.4)'],   btn:['#7c3aed','#a855f7'], grid:'rgba(255,255,255,.04)'  },
  neon:   { bg:['#020617','#0c0a1a','#020617'], orb:['rgba(0,255,200,.22)','rgba(168,85,247,.4)'],   btn:['#06b6d4','#a855f7'], grid:'rgba(0,255,200,.025)'   },
  sunset: { bg:['#1a0505','#2d0e0e','#1a0505'], orb:['rgba(251,146,60,.4)','rgba(239,68,68,.3)'],    btn:['#f97316','#ef4444'], grid:'rgba(255,200,100,.025)'  },
};

function rrect(ctx,x,y,w,h,r){ctx.beginPath();if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);return;}ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function wrapLine(ctx,txt,x,y,maxW,lh){const words=txt.split(' ');let line='';for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,y);y+=lh;line=w;}else line=t;}if(line)ctx.fillText(line,x,y);return y+lh;}

function draw(concert, tplKey) {
  const canvas = document.getElementById('sgCanvas'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const T = TPL[tplKey] || TPL.dark;
  const W = 540, H = 960, BH = 400;

  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,T.bg[0]);bg.addColorStop(.5,T.bg[1]);bg.addColorStop(1,T.bg[2]);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  [[.35,.78,200,T.orb[0]],[.8,.92,170,T.orb[1]]].forEach(([cx,cy,r,col])=>{
    const g=ctx.createRadialGradient(W*cx,H*cy,0,W*cx,H*cy,r);
    g.addColorStop(0,col);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });

  ctx.strokeStyle=T.grid;ctx.lineWidth=1;
  for(let x=0;x<=W;x+=54){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=54){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  function drawContent(){
    const topOv=ctx.createLinearGradient(0,0,0,BH);
    topOv.addColorStop(0,'rgba(0,0,0,.55)');topOv.addColorStop(0.4,'rgba(0,0,0,.10)');
    topOv.addColorStop(0.7,'rgba(0,0,0,.38)');topOv.addColorStop(1,'rgba(0,0,0,.82)');
    ctx.fillStyle=topOv;ctx.fillRect(0,0,W,BH);

    const tOrb=ctx.createRadialGradient(W*.65,BH*.3,0,W*.65,BH*.3,190);
    tOrb.addColorStop(0,T.btn[0]+'55');tOrb.addColorStop(1,'transparent');
    ctx.fillStyle=tOrb;ctx.fillRect(0,0,W,BH);

    ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=10;
    ctx.fillStyle='#fff';ctx.font='bold 17px -apple-system,Inter,sans-serif';
    ctx.fillText('🎵  ConcertID',W/2,52);ctx.shadowBlur=0;

    ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=16;ctx.fillStyle='#fff';
    const aFs=concert.artist.length>20?30:concert.artist.length>14?38:46;
    ctx.font=`bold ${aFs}px -apple-system,Inter,sans-serif`;
    wrapLine(ctx,concert.artist,W/2,BH-104,W-48,aFs+8);ctx.shadowBlur=0;

    ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=10;
    ctx.fillStyle='rgba(240,240,255,.88)';ctx.font='17px -apple-system,Inter,sans-serif';
    const tour=concert.tour.length>52?concert.tour.slice(0,50)+'…':concert.tour;
    ctx.fillText(tour.length>46?tour.slice(0,44)+'…':tour,W/2,BH-56);ctx.shadowBlur=0;

    ctx.textAlign='left';
    ctx.fillStyle='rgba(0,0,0,.52)';rrect(ctx,18,BH-44,136,30,8);ctx.fill();
    ctx.fillStyle='#4ade80';ctx.font='bold 12px -apple-system,Inter,sans-serif';
    ctx.fillText('✅ Confirmed',28,BH-24);

    const dg=ctx.createLinearGradient(40,0,W-40,0);
    dg.addColorStop(0,'transparent');dg.addColorStop(.5,T.btn[0]+'99');dg.addColorStop(1,'transparent');
    ctx.strokeStyle=dg;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(40,BH+18);ctx.lineTo(W-40,BH+18);ctx.stroke();

    const cY=BH+28,cH=264;
    ctx.fillStyle='rgba(255,255,255,.055)';rrect(ctx,36,cY,W-72,cH,20);ctx.fill();
    ctx.strokeStyle=T.btn[0]+'44';ctx.lineWidth=1;rrect(ctx,36,cY,W-72,cH,20);ctx.stroke();

    ctx.textAlign='left';
    [['📅',concert.dates.join(' & ')],['⏰',concert.time],
     ['📍',concert.venue.length>38?concert.venue.slice(0,36)+'…':concert.venue],
     ['🏙️',concert.city]].forEach(([em,val],i)=>{
      const ry=cY+34+i*55;
      ctx.font='bold 20px serif';ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillText(em,56,ry);
      ctx.font=`${val.length>32?15:16}px -apple-system,Inter,sans-serif`;
      ctx.fillStyle='rgba(240,240,245,.82)';
      ctx.fillText(val.length>42?val.slice(0,40)+'…':val,93,ry);
    });

    const btnGrad=ctx.createLinearGradient(100,0,W-100,0);
    btnGrad.addColorStop(0,T.btn[0]);btnGrad.addColorStop(1,T.btn[1]);
    ctx.fillStyle=btnGrad;rrect(ctx,100,cY+cH+24,W-200,52,26);ctx.fill();
    ctx.textAlign='center';ctx.fillStyle='#fff';
    ctx.font='bold 17px -apple-system,Inter,sans-serif';
    ctx.fillText('list-concert-tour.web.id',W/2,cY+cH+57);

    ctx.fillStyle='rgba(120,120,135,.5)';ctx.font='12px -apple-system,Inter,sans-serif';
    ctx.fillText('© ConcertID — Info Konser Internasional di Indonesia',W/2,H-30);
  }

  const imgUrl=`https://www.list-concert-tour.web.id/images/${concert.id}.jpeg`;
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{
    ctx.save();ctx.beginPath();ctx.rect(0,0,W,BH);ctx.clip();
    const sc=Math.max(W/img.naturalWidth,BH/img.naturalHeight);
    const dw=img.naturalWidth*sc,dh=img.naturalHeight*sc;
    ctx.drawImage(img,(W-dw)/2,(BH-dh)/2,dw,dh);ctx.restore();
    drawContent();
  };
  img.onerror=()=>{
    const fb=ctx.createLinearGradient(0,0,W,BH);
    fb.addColorStop(0,T.bg[1]);fb.addColorStop(1,T.bg[2]);
    ctx.fillStyle=fb;ctx.fillRect(0,0,W,BH);
    ctx.textAlign='center';ctx.shadowColor=T.btn[0];ctx.shadowBlur=40;
    ctx.font='96px serif';ctx.fillStyle='#fff';
    ctx.fillText(concert.emoji,W/2,BH/2+28);ctx.shadowBlur=0;
    drawContent();
  };
  img.src=imgUrl;
}

function setTpl(tpl,btn){
  _currentTpl=tpl;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const c=CONCERTS_SAMPLE.find(x=>x.id===_currentId);
  if(c)draw(c,tpl);
}

function setConcert(id,btn){
  _currentId=id;
  document.querySelectorAll('.pick-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const c=CONCERTS_SAMPLE.find(x=>x.id===id);
  if(c)draw(c,_currentTpl);
}

function download(){
  const canvas=document.getElementById('sgCanvas');if(!canvas)return;
  const c=CONCERTS_SAMPLE.find(x=>x.id===_currentId);
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=`concertid-${_currentId}.png`;
  a.click();
}

// Build concert picker buttons
const picker=document.getElementById('concertPicker');
CONCERTS_SAMPLE.forEach((c,i)=>{
  const btn=document.createElement('button');
  btn.className='pick-btn'+(i===0?' active':'');
  btn.textContent=`${c.emoji} ${c.artist}`;
  btn.onclick=()=>setConcert(c.id,btn);
  picker.appendChild(btn);
});

// Initial render
draw(CONCERTS_SAMPLE[0],'dark');
</script>
</body>
</html>
