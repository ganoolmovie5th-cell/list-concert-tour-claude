<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menghubungkan ke ConcertID...</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#09090b;color:#f4f4f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#18181c;border:1px solid rgba(168,85,247,.25);border-radius:20px;padding:40px 32px;max-width:400px;width:100%;text-align:center}
    .icon{font-size:3rem;margin-bottom:16px}
    h1{font-size:1.25rem;font-weight:800;margin-bottom:8px}
    p{color:#9ca3af;font-size:.9rem;line-height:1.6}
    .spinner{width:36px;height:36px;border:3px solid rgba(168,85,247,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{display:none;margin-top:20px;padding:14px;background:#ef444418;border:1px solid #ef444444;border-radius:12px;color:#f87171;font-size:.85rem}
    .btn{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:12px 24px;background:#a855f7;color:#fff;border:none;border-radius:99px;font-size:.9rem;font-weight:700;cursor:pointer;text-decoration:none}
    .btn:hover{opacity:.85}
    .code-box{display:none;margin-top:16px;padding:12px;background:#111114;border:1px solid rgba(255,255,255,.08);border-radius:10px;font-family:monospace;font-size:.75rem;color:#9ca3af;word-break:break-all;text-align:left}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎵</div>
    <h1>Menghubungkan ke ConcertID...</h1>
    <p>Spotify berhasil login. Mengalihkan kembali ke aplikasi...</p>
    <div class="spinner" id="spinner"></div>

    <div class="error" id="errorBox">
      <strong>Tidak bisa membuka app secara otomatis.</strong><br/>
      Pastikan ConcertID sudah terinstall, lalu tap tombol di bawah.
    </div>

    <a id="openBtn" class="btn" style="display:none">
      📱 Buka ConcertID
    </a>

    <div class="code-box" id="codeBox"></div>
  </div>

  <script>
    (function () {
      // Ambil semua query params dari URL (diteruskan dari Spotify)
      var search = window.location.search;  // ?code=xxx&state=xxx
      var hash   = window.location.hash;    // fallback

      var params = search || (hash ? '?' + hash.replace('#', '') : '');
      if (!params) {
        showError('Tidak ada kode dari Spotify. Coba ulangi proses login.');
        return;
      }

      // Deep link ke ConcertID app
      var deepLink = 'concertid://spotify-auth' + params;

      // Set tombol fallback
      var btn = document.getElementById('openBtn');
      btn.href = deepLink;

      // Coba redirect otomatis
      window.location.href = deepLink;

      // Jika setelah 2.5 detik masih di halaman ini → app tidak terbuka
      setTimeout(function () {
        showError();
        btn.style.display = 'inline-flex';

        // Debug: tampilkan kode di box
        var code = new URLSearchParams(search).get('code');
        if (code) {
          var box = document.getElementById('codeBox');
          box.style.display = 'block';
          box.textContent = 'Code: ' + code.slice(0, 20) + '...';
        }
      }, 2500);

      function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        var el = document.getElementById('errorBox');
        el.style.display = 'block';
        if (msg) el.innerHTML = '<strong>' + msg + '</strong>';
      }
    })();
  </script>
</body>
</html>
